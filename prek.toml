# prek.toml — pre-commit hook configuration for oh-my-codex (polyglot Rust+TypeScript)
# See https://prek.j178.dev/ for documentation.

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v4.6.0"
hooks = [
  { id = "check-yaml", pass_filenames = false },
  { id = "check-json", pass_filenames = false },
  { id = "check-toml", pass_filenames = false },
  { id = "check-merge-conflict", pass_filenames = false },
  { id = "end-of-file-fixer", pass_filenames = false },
  { id = "trailing-whitespace", pass_filenames = false },
]

# Rust formatting and clippy are run separately by .github/workflows/ci.yml
# (Rust Format / Rust Clippy lanes) which install the toolchain via
# dtolnay/rust-toolchain and run cargo fmt --check / cargo clippy directly.
# The doublify/pre-commit-rust mirror is archived and its hook IDs are gone,
# so it is intentionally not used here.
