# prek.toml — pre-commit hook configuration for oh-my-codex (polyglot Rust+TypeScript)
# See https://prek.j178.dev/ for documentation.

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v4.6.0"
hooks = [
  { id = "check-yaml", pass_filenames = false },
  { id = "check-json", pass_filenames = false },
  { id = "check-toml", pass_filenames = false },
  { id = "check-merge-conflict", pass_filenames = false },
  { id = "end-of-file-fixer", pass_filenames = false },
  { id = "trailing-whitespace", pass_filenames = false },
]

[[repos]]
repo = "https://github.com/doublify/pre-commit-rust"
rev = "v1.0"
hooks = [
  { id = "cargo-fmt", pass_filenames = false },
  { id = "cargo-clippy", args = ["--all-targets", "--", "-D", "warnings"], pass_filenames = false },
]
